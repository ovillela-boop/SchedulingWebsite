{% extends "base.html" %}

{% block title %}Saved Users{% endblock %}

{% block content %}
  <header class="home-header">
    <h1>Saved Users</h1>
  </header>

  <main class="home-main">
    <section class="feature-card">
      <h2>User List</h2>

      {% if users %}
        <table border="1" cellpadding="10">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody>
            {% for user in users %}
              <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p>No users found.</p>
      {% endif %}
    </section>
  </main>
{% endblock %}
