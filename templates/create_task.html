<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task</title>
</head>
<body>
    <h1>Create New Task</h1>
    <a href="{{ url_for('tasks_view') }}">Back to Tasks Dashboard</a>
    <br><br>
    
    <form action="{{ url_for('create_task') }}" method="POST">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required><br><br>
        
        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="5" cols="40"></textarea><br><br>
        
        <label for="assigned_to">Assign To (Optional):</label><br>
        <select id="assigned_to" name="assigned_to">
            <option value="">-- Unassigned --</option>
            {% for u in users %}
                <option value="{{ u.id }}">{{ u.name }} ({{ u.role }})</option>
            {% endfor %}
        </select><br><br>
        
        <button type="submit">Create Task</button>
    </form>
</body>
</html>
