<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Scheduling Website{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Basic navbar styling for immediate usability */
    .navbar {
      background-color: #333;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .navbar a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }
    .navbar .right {
      float: right;
    }
    .flash-error {
      color: white;
      background-color: #dc3545;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  {% if session.get('user_id') %}
  <nav class="navbar">
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('tasks_view') }}">Tasks</a>
    <a href="{{ url_for('shifts_view') }}">Shifts</a>
    <a href="{{ url_for('clock_view') }}">Clock</a>
    
    {% if session.get('role') == 'Manager' %}
    <a href="{{ url_for('manager_dashboard') }}" style="color: #ffcccc;">Manager Dash</a>
    {% endif %}
    
    <div class="right">
      <a href="{{ url_for('logout') }}">Log Out ({{ session.get('name') }})</a>
    </div>
  </nav>
  {% endif %}

  <main>
    {% block content %}
    {% endblock %}
  </main>

</body>
</html>
